<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫師智能排班系統</title>
    <style>
        :root {
            --primary-color: #0056b3; /* 醫療藍 */
            --secondary-color: #f0f7ff; /* 淺藍背景 */
            --border-color: #dde0e3;
            --text-color: #333;
            --danger-color: #dc3545;
            --night-color: #d32f2f; /* 大夜紅 */
            --small-night-color: #1976d2; /* 小夜藍 */
            --off-color: #9e9e9e; /* 休假灰 */
            --weekend-bg: #e9ecef; /* 週末背景灰 */
        }

        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background-color: #f4f6f8;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 15px;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group-full {
            grid-column: 1 / -1;
        }

        .input-note {
            margin-top: 6px;
            font-size: 12px;
            color: #6c757d;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        input, select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-generate {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(0, 86, 179, 0.2);
        }

        .btn-generate:hover { background-color: #004494; transform: translateY(-1px); }

        .btn-print { background-color: #6c757d; color: white; }
        .btn-print:hover { background-color: #5a6268; }

        /* 新增 Excel 按鈕樣式 */
        .btn-excel { background-color: #28a745; color: white; }
        .btn-excel:hover { background-color: #218838; }
        .btn-preleave { background-color: #ffb300; color: #222; }
        .btn-preleave:hover { background-color: #f29f05; transform: translateY(-1px); }
        .btn-add-rule {
            padding: 10px 18px;
            background: #eef6ff;
            color: var(--primary-color);
            border: 1px solid #b9d2f1;
        }
        .btn-add-rule:hover {
            background: #dcecff;
        }

        #resultTitle {
            text-align: center;
            margin-top: 40px;
            font-size: 22px;
            color: #333;
            font-weight: bold;
        }

        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 500;
            white-space: nowrap;
        }

        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f8ff; }

        /* 新增：週末樣式 */
        .weekend-row { background-color: var(--weekend-bg) !important; }

        /* 班別顏色 */
        .shift-day { font-weight: bold; color: black; }
        .shift-sn { font-weight: bold; color: var(--small-night-color); }
        .shift-bn { font-weight: bold; color: var(--night-color); }
        .shift-off { color: var(--off-color); }

        /* 新增：統計區塊樣式 */
        .stats-container {
            margin-top: 40px;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }
        .stats-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #555;
            text-align: center;
        }

        .avoid-rules-panel {
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: #f9fbfd;
        }

        .avoid-rules-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .avoid-rule-row {
            display: grid;
            grid-template-columns: minmax(170px, 1fr) minmax(170px, 1fr) auto;
            gap: 12px;
            align-items: center;
        }

        .avoid-rule-row select {
            width: 100%;
        }

        .avoid-rules-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .avoid-rules-summary {
            font-size: 14px;
            font-weight: 600;
            color: #4f5d73;
        }

        .btn-remove-rule {
            padding: 10px 16px;
            background: #fff1f0;
            color: #b42318;
            border: 1px solid #f2c6c3;
        }

        .btn-remove-rule:hover {
            background: #ffe0dd;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.55);
            z-index: 1000;
        }

        .modal-overlay.is-open {
            display: flex;
        }

        .modal-card {
            width: min(1120px, 100%);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.22);
            overflow: hidden;
        }

        .modal-header,
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 24px;
            background: #f8fbff;
        }

        .modal-header {
            border-bottom: 1px solid #dbe6f3;
        }

        .modal-footer {
            border-top: 1px solid #dbe6f3;
            flex-wrap: wrap;
        }

        .modal-title {
            margin: 0;
            font-size: 20px;
            color: var(--primary-color);
        }

        .modal-subtitle {
            margin: 6px 0 0;
            font-size: 14px;
            color: #4f5d73;
        }

        .modal-body {
            padding: 20px 24px 24px;
            overflow: auto;
        }

        .preleave-summary {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fff8e1;
            color: #7a5600;
            font-size: 14px;
            font-weight: 600;
        }

        .preleave-grid-wrap {
            overflow: auto;
            border: 1px solid #d7dee8;
            border-radius: 12px;
            background: #fff;
        }

        .preleave-grid {
            min-width: max-content;
            border-collapse: separate;
            border-spacing: 0;
        }

        .preleave-grid th,
        .preleave-grid td {
            padding: 0;
            min-width: 58px;
            height: 46px;
            border: 1px solid #d7dee8;
            user-select: none;
        }

        .preleave-grid thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #0f5fbf;
            color: #fff;
        }

        .preleave-grid .doctor-header {
            position: sticky;
            left: 0;
            z-index: 1;
            min-width: 92px;
            padding: 0 12px;
            background: #edf4ff;
            color: #23446b;
            font-weight: 700;
            white-space: nowrap;
        }

        .preleave-grid thead .doctor-header {
            z-index: 3;
            background: #0f5fbf;
            color: #fff;
        }

        .preleave-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            border: 0;
            background: #f9fbfd;
            color: #7a8799;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            touch-action: none;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .preleave-cell:hover {
            background: #eef6ff;
        }

        .preleave-cell.is-selected {
            background: #ffe082;
            color: #6a4300;
        }

        .preleave-cell.is-selected:hover {
            background: #ffd54f;
        }

        .modal-footer-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dfe3e7;
        }

        .btn-danger {
            background: #fbe9e7;
            color: #b5412d;
        }

        .btn-danger:hover {
            background: #ffd6cf;
        }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: none; padding: 0; }
            .input-grid, .btn-group, header, .modal-overlay { display: none !important; }
            #resultTitle { margin-top: 0; font-size: 24px; }
            table { font-size: 12px; }
            th { background-color: #ddd !important; color: black !important; -webkit-print-color-adjust: exact; }
            .shift-sn { color: blue !important; }
            .shift-bn { color: red !important; }
            .weekend-row { background-color: #f0f0f0 !important; -webkit-print-color-adjust: exact; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .modal-overlay {
                padding: 12px;
            }

            .modal-header,
            .modal-footer,
            .modal-body {
                padding-left: 16px;
                padding-right: 16px;
            }

            .modal-footer-actions {
                width: 100%;
                margin-left: 0;
            }

            .modal-footer-actions button {
                flex: 1 1 140px;
            }

            .avoid-rule-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>醫師智能排班系統</h1>
        <p style="color: #666; font-size: 14px; margin-top:5px;">by CHIU</p>
    </header>

    <div class="input-grid">
        <div class="input-group">
            <label for="inputDept">1. 科別名稱</label>
            <input type="text" id="inputDept" placeholder="例如：急診科" value="急診科">
        </div>

        <div class="input-group">
            <label for="inputMonth">2. 月份 (1-12)</label>
            <input type="number" id="inputMonth" placeholder="輸入數字" min="1" max="12" oninput="handleMonthChange()">
        </div>

        <div class="input-group">
            <label for="inputDays">3. 本月天數</label>
            <input type="number" id="inputDays" placeholder="依月份自動帶入" min="28" max="31" value="30" readonly>
            <span class="input-note">輸入月份後，會依目前年份自動帶入當月總天數。</span>
        </div>

        <div class="input-group">
            <label for="inputDoctorCount">4. 參與排班醫師數</label>
            <input type="number" id="inputDoctorCount" placeholder="輸入 3~80" min="3" max="80" value="10" oninput="handleDoctorCountChange()" onblur="commitDoctorCountInput()">
            <span class="input-note">最少 3 位，最多 80 位醫師。</span>
        </div>

        <div class="input-group input-group-full">
            <label for="avoidRulesContainer">5. 醫師個別避班規則</label>
            <div class="avoid-rules-panel">
                <div id="avoidRulesContainer" class="avoid-rules-container"></div>
                <div class="avoid-rules-toolbar">
                    <button class="btn-add-rule" id="btnAddAvoidRule" type="button" onclick="addAvoidRuleRow()">＋ 新增規則</button>
                    <span id="avoidRulesSummary" class="avoid-rules-summary">目前共 0 條有效避班規則</span>
                </div>
                <span class="input-note">可為不同醫師設定不同不排班別，同一位醫師也可以避開多個班別。</span>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-generate" onclick="generateSchedule()">⚡ 開始自動排班</button>
        <button class="btn-preleave" id="btnPreLeave" type="button" onclick="openPreLeaveModal()">🗓️ 先行手動預假</button>
        <button class="btn-print" onclick="window.print()">🖨️ 列印班表</button>
        <button class="btn-excel" onclick="exportToCSV()">📥 匯出 Excel</button>
    </div>

    <h2 id="resultTitle"></h2>
    
    <div id="tableContainer" class="table-responsive"></div>

    <div id="statsContainer" class="stats-container" style="display:none;">
        <div class="stats-title">📊 班數統計 (公平性檢查)</div>
        <div id="statsTable" class="table-responsive"></div>
    </div>
</div>

<div id="preLeaveModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="preLeaveTitle">
    <div class="modal-card">
        <div class="modal-header">
            <div>
                <h2 id="preLeaveTitle" class="modal-title">先行手動預假</h2>
                <p class="modal-subtitle">拖拉表格可批次標記預假，再拖一次可取消。預假完成後，當次排班會自動排為休。</p>
            </div>
            <button class="btn-secondary" type="button" onclick="closePreLeaveModal()">取消</button>
        </div>

        <div class="modal-body">
            <div id="preLeaveSummary" class="preleave-summary"></div>
            <div class="preleave-grid-wrap">
                <div id="preLeaveGrid"></div>
            </div>
        </div>

        <div class="modal-footer">
            <span>提示：完成會儲存，取消只關閉視窗。</span>
            <div class="modal-footer-actions">
                <button class="btn-danger" type="button" onclick="clearPreLeaveMatrix()">全部清除</button>
                <button class="btn-secondary" type="button" onclick="closePreLeaveModal()">取消</button>
                <button class="btn-generate" type="button" onclick="savePreLeaveFromModal()">完成</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 全域變數，供匯出功能使用
    let globalScheduleData = [];
    let globalTitle = "";
    let globalDocs = [];
    let preLeaveMatrix = [];
    let modalPreLeaveMatrix = [];
    let activePreLeaveContext = null;
    let isDraggingPreLeave = false;
    let dragPreLeaveValue = false;
    let dragVisitedCells = new Set();

    function getCurrentYear() {
        return new Date().getFullYear();
    }

    function normalizeDoctorCount(value, { enforceMin = true } = {}) {
        const parsed = Number.parseInt(value, 10);
        if (Number.isNaN(parsed)) {
            return NaN;
        }
        const withMax = Math.min(80, parsed);
        return enforceMin ? Math.max(3, withMax) : withMax;
    }

    function syncDoctorCountInput(options = {}) {
        const doctorCountInput = document.getElementById("inputDoctorCount");
        if (!doctorCountInput) {
            return 10;
        }

        const normalized = normalizeDoctorCount(doctorCountInput.value, options);
        if (Number.isNaN(normalized)) {
            return NaN;
        }

        doctorCountInput.value = String(normalized);
        return normalized;
    }

    function commitDoctorCountInput() {
        return syncDoctorCountInput();
    }

    function getDoctorCount() {
        const normalized = normalizeDoctorCount(document.getElementById("inputDoctorCount")?.value ?? "10");
        if (Number.isNaN(normalized)) {
            return 10;
        }
        return normalized;
    }

    function getDoctorList(doctorCount = getDoctorCount()) {
        return Array.from({ length: doctorCount }, (_, index) => `醫師${String(index + 1).padStart(2, "0")}`);
    }

    function getShiftList() {
        return ["白班", "小夜", "大夜"];
    }

    function getCurrentDept() {
        return document.getElementById("inputDept").value.trim();
    }

    function getDaysInMonth(month, year = new Date().getFullYear()) {
        return new Date(year, month, 0).getDate();
    }

    function getValidMonthValue() {
        const month = parseInt(document.getElementById("inputMonth").value, 10);
        if (Number.isNaN(month) || month < 1 || month > 12) {
            return NaN;
        }
        return month;
    }

    function syncDaysInMonthFromInput() {
        const daysInput = document.getElementById("inputDays");
        const month = getValidMonthValue();

        if (Number.isNaN(month)) {
            daysInput.value = "";
            return NaN;
        }

        const days = getDaysInMonth(month);
        daysInput.value = days;
        return days;
    }

    function createEmptyPreLeaveMatrix(daysInMonth, doctorCount = getDoctorCount()) {
        return Array.from({ length: doctorCount }, () => Array(daysInMonth).fill(false));
    }

    function clonePreLeaveMatrix(matrix) {
        return matrix.map(row => row.slice());
    }

    function createOptionsHtml(options, selectedValue, placeholder) {
        let html = `<option value="">${placeholder}</option>`;
        options.forEach((option) => {
            const value = typeof option === "string" ? option : String(option.value);
            const label = typeof option === "string" ? option : option.label;
            const isSelected = value === String(selectedValue);
            html += `<option value="${value}"${isSelected ? " selected" : ""}>${label}</option>`;
        });
        return html;
    }

    function createAvoidRuleRow(doctorValue = "", shiftValue = "") {
        const doctorOptions = getDoctorList().map((doctor, index) => ({ value: index, label: doctor }));
        const shiftOptions = getShiftList();
        return `
            <div class="avoid-rule-row">
                <select class="avoid-rule-doctor" onchange="renderAvoidRulesSummary()">
                    ${createOptionsHtml(doctorOptions, doctorValue, "選擇醫師")}
                </select>
                <select class="avoid-rule-shift" onchange="renderAvoidRulesSummary()">
                    ${createOptionsHtml(shiftOptions, shiftValue, "選擇不排班別")}
                </select>
                <button class="btn-remove-rule" type="button" onclick="removeAvoidRuleRow(this)">刪除</button>
            </div>
        `;
    }

    function getAvoidRuleRowDrafts() {
        return Array.from(document.querySelectorAll(".avoid-rule-row")).map((row) => ({
            doctorValue: row.querySelector(".avoid-rule-doctor")?.value ?? "",
            shiftValue: row.querySelector(".avoid-rule-shift")?.value ?? ""
        }));
    }

    function normalizeAvoidRuleDrafts(ruleDrafts) {
        const doctorCount = getDoctorCount();
        return ruleDrafts.filter((draft) => {
            if (!draft) {
                return false;
            }

            if (draft.doctorValue === "") {
                return true;
            }

            const doctorIndex = Number.parseInt(draft.doctorValue, 10);
            return !Number.isNaN(doctorIndex) && doctorIndex < doctorCount;
        });
    }

    function renderAvoidRuleRows(ruleDrafts = getAvoidRuleRowDrafts()) {
        const container = document.getElementById("avoidRulesContainer");
        if (!container) {
            return;
        }

        const normalizedDrafts = normalizeAvoidRuleDrafts(ruleDrafts);
        const draftsToRender = normalizedDrafts.length ? normalizedDrafts : [{ doctorValue: "", shiftValue: "" }];

        container.innerHTML = draftsToRender
            .map((draft) => createAvoidRuleRow(draft.doctorValue, draft.shiftValue))
            .join("");

        renderAvoidRulesSummary();
    }

    function addAvoidRuleRow(doctorValue = "", shiftValue = "") {
        const ruleDrafts = getAvoidRuleRowDrafts();
        ruleDrafts.push({ doctorValue: String(doctorValue), shiftValue });
        renderAvoidRuleRows(ruleDrafts);
    }

    function removeAvoidRuleRow(button) {
        const row = button.closest(".avoid-rule-row");
        const rows = Array.from(document.querySelectorAll(".avoid-rule-row"));
        const rowIndex = rows.indexOf(row);
        const ruleDrafts = getAvoidRuleRowDrafts().filter((_, index) => index !== rowIndex);
        renderAvoidRuleRows(ruleDrafts);
    }

    function collectAvoidRules() {
        const doctorCount = getDoctorCount();
        const rows = document.querySelectorAll(".avoid-rule-row");
        const uniqueKeys = new Set();
        const rules = [];

        rows.forEach((row) => {
            const doctorValue = row.querySelector(".avoid-rule-doctor")?.value ?? "";
            const shiftValue = row.querySelector(".avoid-rule-shift")?.value ?? "";
            const doctorIndex = Number.parseInt(doctorValue, 10);

            if (Number.isNaN(doctorIndex) || doctorIndex < 0 || doctorIndex >= doctorCount || !shiftValue) {
                return;
            }

            const ruleKey = `${doctorIndex}:${shiftValue}`;
            if (uniqueKeys.has(ruleKey)) {
                return;
            }

            uniqueKeys.add(ruleKey);
            rules.push({ doctorIndex, shift: shiftValue });
        });

        return rules;
    }

    function formatAvoidRulesSummary(avoidRules) {
        if (!avoidRules.length) {
            return "目前共 0 條有效避班規則";
        }

        const doctorList = getDoctorList();
        const preview = avoidRules
            .slice(0, 3)
            .map((rule) => `${doctorList[rule.doctorIndex]}不排${rule.shift}`)
            .join("、");

        if (avoidRules.length <= 3) {
            return `目前共 ${avoidRules.length} 條有效避班規則：${preview}`;
        }

        return `目前共 ${avoidRules.length} 條有效避班規則：${preview} 等`;
    }

    function renderAvoidRulesSummary() {
        const summary = document.getElementById("avoidRulesSummary");
        if (!summary) {
            return;
        }

        summary.textContent = formatAvoidRulesSummary(collectAvoidRules());
    }

    function buildAvoidRuleMap(avoidRules, doctorCount = getDoctorCount()) {
        const ruleMap = Array.from({ length: doctorCount }, () => new Set());
        avoidRules.forEach((rule) => {
            ruleMap[rule.doctorIndex].add(rule.shift);
        });
        return ruleMap;
    }

    function initializeAvoidRulesUI() {
        renderAvoidRuleRows([{ doctorValue: "", shiftValue: "" }]);
    }

    function getPreLeaveStorageKey(dept, year, month) {
        return `doctorSchedulePreLeave:${dept || "default"}:${year}:${month}`;
    }

    function getActivePreLeaveContext() {
        const month = getValidMonthValue();
        if (Number.isNaN(month)) {
            return null;
        }

        return {
            dept: getCurrentDept(),
            year: getCurrentYear(),
            month,
            daysInMonth: getDaysInMonth(month, getCurrentYear()),
            doctorCount: getDoctorCount()
        };
    }

    function loadPreLeaveMatrix(context = getActivePreLeaveContext()) {
        if (!context) {
            preLeaveMatrix = [];
            activePreLeaveContext = null;
            return preLeaveMatrix;
        }

        const doctorCount = context.doctorCount ?? getDoctorCount();
        const fallbackMatrix = createEmptyPreLeaveMatrix(context.daysInMonth, doctorCount);
        const storageKey = getPreLeaveStorageKey(context.dept, context.year, context.month);
        const rawValue = localStorage.getItem(storageKey);

        if (!rawValue) {
            preLeaveMatrix = fallbackMatrix;
            activePreLeaveContext = context;
            return preLeaveMatrix;
        }

        try {
            const parsed = JSON.parse(rawValue);
            if (!Array.isArray(parsed)) {
                throw new Error("Invalid pre-leave payload");
            }

            preLeaveMatrix = fallbackMatrix.map((row, doctorIndex) => {
                const savedRow = Array.isArray(parsed[doctorIndex]) ? parsed[doctorIndex] : [];
                return row.map((_, dayIndex) => Boolean(savedRow[dayIndex]));
            });
        } catch (error) {
            preLeaveMatrix = fallbackMatrix;
        }

        activePreLeaveContext = context;
        return preLeaveMatrix;
    }

    function savePreLeaveMatrix(context = activePreLeaveContext || getActivePreLeaveContext()) {
        if (!context) {
            return;
        }

        const storageKey = getPreLeaveStorageKey(context.dept, context.year, context.month);
        localStorage.setItem(storageKey, JSON.stringify(preLeaveMatrix));
        activePreLeaveContext = context;
    }

    function countSelectedPreLeaves(matrix) {
        return matrix.reduce((total, row) => total + row.filter(Boolean).length, 0);
    }

    function updatePreLeaveSummary(context = activePreLeaveContext || getActivePreLeaveContext()) {
        const summary = document.getElementById("preLeaveSummary");
        if (!summary || !context) {
            return;
        }

        const totalSelected = countSelectedPreLeaves(modalPreLeaveMatrix);
        const deptLabel = context.dept || "未填科別";
        summary.textContent = `${deptLabel} ${context.year} 年 ${context.month} 月：已標記 ${totalSelected} 格預假。`;
    }

    function renderPreLeaveGrid() {
        const gridContainer = document.getElementById("preLeaveGrid");
        if (!gridContainer || !activePreLeaveContext) {
            return;
        }

        const doctors = getDoctorList(activePreLeaveContext.doctorCount);
        let html = '<table class="preleave-grid"><thead><tr><th class="doctor-header">醫師\\日期</th>';
        for (let day = 1; day <= activePreLeaveContext.daysInMonth; day++) {
            html += `<th>${day}</th>`;
        }
        html += "</tr></thead><tbody>";

        doctors.forEach((doctorName, doctorIndex) => {
            html += `<tr><th class="doctor-header">${doctorName}</th>`;
            for (let dayIndex = 0; dayIndex < activePreLeaveContext.daysInMonth; dayIndex++) {
                const isSelected = Boolean(modalPreLeaveMatrix[doctorIndex][dayIndex]);
                const cellClass = isSelected ? "preleave-cell is-selected" : "preleave-cell";
                const label = isSelected ? "預假" : "";
                html += `<td><button type="button" class="${cellClass}" data-doctor-index="${doctorIndex}" data-day-index="${dayIndex}" aria-pressed="${isSelected}">${label}</button></td>`;
            }
            html += "</tr>";
        });

        html += "</tbody></table>";
        gridContainer.innerHTML = html;
        updatePreLeaveSummary();
    }

    function setPreLeaveCellValue(doctorIndex, dayIndex, value) {
        if (!modalPreLeaveMatrix[doctorIndex] || typeof modalPreLeaveMatrix[doctorIndex][dayIndex] === "undefined") {
            return;
        }

        modalPreLeaveMatrix[doctorIndex][dayIndex] = value;
        const selector = `[data-doctor-index="${doctorIndex}"][data-day-index="${dayIndex}"]`;
        const cell = document.querySelector(selector);
        if (cell) {
            cell.classList.toggle("is-selected", value);
            cell.textContent = value ? "預假" : "";
            cell.setAttribute("aria-pressed", value ? "true" : "false");
        }
        updatePreLeaveSummary();
    }

    function beginPreLeaveDrag(button) {
        const doctorIndex = Number(button.dataset.doctorIndex);
        const dayIndex = Number(button.dataset.dayIndex);
        dragPreLeaveValue = !modalPreLeaveMatrix[doctorIndex][dayIndex];
        isDraggingPreLeave = true;
        dragVisitedCells = new Set();
        applyDraggedPreLeave(button);
    }

    function applyDraggedPreLeave(button) {
        if (!button || !isDraggingPreLeave) {
            return;
        }

        const doctorIndex = Number(button.dataset.doctorIndex);
        const dayIndex = Number(button.dataset.dayIndex);
        const key = `${doctorIndex}-${dayIndex}`;

        if (dragVisitedCells.has(key)) {
            return;
        }

        dragVisitedCells.add(key);
        setPreLeaveCellValue(doctorIndex, dayIndex, dragPreLeaveValue);
    }

    function stopPreLeaveDrag() {
        isDraggingPreLeave = false;
        dragVisitedCells = new Set();
    }

    function handlePreLeaveGridPointerDown(event) {
        const button = event.target.closest(".preleave-cell");
        if (!button) {
            return;
        }

        event.preventDefault();
        beginPreLeaveDrag(button);
    }

    function handlePreLeaveGridPointerOver(event) {
        const button = event.target.closest(".preleave-cell");
        if (!button || !isDraggingPreLeave) {
            return;
        }

        applyDraggedPreLeave(button);
    }

    function clearPreLeaveMatrix() {
        if (!activePreLeaveContext) {
            return;
        }

        preLeaveMatrix = createEmptyPreLeaveMatrix(activePreLeaveContext.daysInMonth, activePreLeaveContext.doctorCount);
        modalPreLeaveMatrix = clonePreLeaveMatrix(preLeaveMatrix);
        savePreLeaveMatrix(activePreLeaveContext);
        renderPreLeaveGrid();
    }

    function closePreLeaveModal() {
        document.getElementById("preLeaveModal").classList.remove("is-open");
        stopPreLeaveDrag();
        modalPreLeaveMatrix = [];
    }

    function savePreLeaveFromModal() {
        if (!activePreLeaveContext) {
            closePreLeaveModal();
            return;
        }

        preLeaveMatrix = clonePreLeaveMatrix(modalPreLeaveMatrix);
        savePreLeaveMatrix(activePreLeaveContext);
        closePreLeaveModal();
    }

    function openPreLeaveModal() {
        const context = getActivePreLeaveContext();
        if (!context) {
            alert("請先輸入有效月份，再設定手動預假。");
            return;
        }

        loadPreLeaveMatrix(context);
        modalPreLeaveMatrix = clonePreLeaveMatrix(preLeaveMatrix);
        renderPreLeaveGrid();
        document.getElementById("preLeaveModal").classList.add("is-open");
    }

    function handleMonthChange() {
        syncDaysInMonthFromInput();
        const context = getActivePreLeaveContext();
        if (!context) {
            preLeaveMatrix = [];
            activePreLeaveContext = null;
            return;
        }

        loadPreLeaveMatrix(context);
        if (document.getElementById("preLeaveModal").classList.contains("is-open")) {
            modalPreLeaveMatrix = clonePreLeaveMatrix(preLeaveMatrix);
            renderPreLeaveGrid();
        }
    }

    function handleDoctorCountChange() {
        const doctorCount = normalizeDoctorCount(
            document.getElementById("inputDoctorCount")?.value ?? "10",
            { enforceMin: false }
        );
        if (Number.isNaN(doctorCount)) {
            return;
        }

        const doctorCountInput = document.getElementById("inputDoctorCount");
        if (doctorCountInput && doctorCount > 80) {
            doctorCountInput.value = "80";
        }

        renderAvoidRuleRows();

        const context = getActivePreLeaveContext();
        if (!context) {
            return;
        }

        if (document.getElementById("preLeaveModal").classList.contains("is-open")) {
            closePreLeaveModal();
        }

        loadPreLeaveMatrix(context);
        savePreLeaveMatrix(context);
    }

    function initializePreLeaveModalEvents() {
        const modal = document.getElementById("preLeaveModal");
        const grid = document.getElementById("preLeaveGrid");

        grid.addEventListener("pointerdown", handlePreLeaveGridPointerDown);
        grid.addEventListener("pointerover", handlePreLeaveGridPointerOver);
        window.addEventListener("pointerup", stopPreLeaveDrag);
        window.addEventListener("pointercancel", stopPreLeaveDrag);
        modal.addEventListener("click", (event) => {
            if (event.target === modal) {
                closePreLeaveModal();
            }
        });
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && modal.classList.contains("is-open")) {
                closePreLeaveModal();
            }
        });
    }

    function applyPreLeaveToSchedule(daySchedule, availableWorkers, dayIndex, stats) {
        const filteredWorkers = [];

        availableWorkers.forEach((workerIndex) => {
            if (preLeaveMatrix[workerIndex] && preLeaveMatrix[workerIndex][dayIndex]) {
                daySchedule[workerIndex] = "休";
                stats[workerIndex]["休"]++;
                return;
            }
            filteredWorkers.push(workerIndex);
        });

        return filteredWorkers;
    }

    document.addEventListener("DOMContentLoaded", () => {
        syncDaysInMonthFromInput();
        syncDoctorCountInput();
        initializeAvoidRulesUI();
        initializePreLeaveModalEvents();
        loadPreLeaveMatrix();
    });

    function generateSchedule() {
        const dept = document.getElementById("inputDept").value.trim();
        const monthVal = document.getElementById("inputMonth").value.trim();
        let daysInMonth = syncDaysInMonthFromInput();
        const doctorCount = syncDoctorCountInput();
        const avoidRules = collectAvoidRules();
        const avoidRuleMap = buildAvoidRuleMap(avoidRules, doctorCount);

        // --- 驗證邏輯 ---
        if (!monthVal || isNaN(monthVal)) {
            alert("【錯誤】月份格式錯誤！\n請輸入 1 到 12 之間的數字。");
            return;
        }
        if (isNaN(doctorCount)) {
            alert("【錯誤】參與排班醫師數格式錯誤！\n請輸入 3 到 80 之間的數字。");
            return;
        }
        if (doctorCount < 3) {
            alert("【錯誤】至少需要 3 位醫師才能排白班、小夜、大夜。");
            return;
        }
        const mNum = parseInt(monthVal);
        if (mNum < 1 || mNum > 12) {
            alert(`【錯誤】月份錯誤！\n您輸入了: ${mNum}\n請輸入 1 到 12 之間的數字。`);
            return;
        }

        if (isNaN(daysInMonth) || daysInMonth < 28 || daysInMonth > 31) {
            alert("天數設定異常 (請輸入 28~31)，本次將以 30 天計算。");
            daysInMonth = 30;
            document.getElementById("inputDays").value = 30;
        }

        loadPreLeaveMatrix({
            dept,
            year: getCurrentYear(),
            month: mNum,
            daysInMonth,
            doctorCount
        });

        // --- 標題生成 ---
        const chiMonths = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二"];
        globalTitle = `${dept}${chiMonths[mNum]}月班表`;
        document.getElementById("resultTitle").innerText = globalTitle;

        // === 2. 核心排班邏輯 ===
        let schedule = []; 
        let lastShift = new Array(doctorCount).fill("");
        let shiftCounts = new Array(doctorCount).fill(0);
        
        // 新增：用來統計每個人各種班別的數量 (for 統計表)
        // stats[doc_index] = { "白班":0, "小夜":0, "大夜":0, "休":0 }
        let stats = Array.from({length: doctorCount}, () => ({ "白班":0, "小夜":0, "大夜":0, "休":0 }));

        let attemptCount = 0;
        const dailyShifts = ["白班", "小夜", "大夜"];
        let isSuccess = false;

        while (attemptCount < 1000) {
            attemptCount++;
            isSuccess = true;
            schedule = [];
            for (let i = 0; i < doctorCount; i++) { lastShift[i] = ""; shiftCounts[i] = 0; }
            
            // 重置統計 (因為每次 retry 都要重新算)
            stats = Array.from({length: doctorCount}, () => ({ "白班":0, "小夜":0, "大夜":0, "休":0 }));

            for (let day = 1; day <= daysInMonth; day++) {
                let daySchedule = new Array(doctorCount).fill("");
                let availableWorkers = [];
                for (let i = 0; i < doctorCount; i++) availableWorkers.push(i);
                availableWorkers = applyPreLeaveToSchedule(daySchedule, availableWorkers, day - 1, stats);

                if (availableWorkers.length < dailyShifts.length) {
                    isSuccess = false;
                    break;
                }

                for (let s = 0; s < 3; s++) {
                    let shiftName = dailyShifts[s];
                    let validPick = false;
                    let safetyCount = 0;
                    let minCurrentCounts = 100;
                    
                    for (let i = 0; i < doctorCount; i++) {
                        if (shiftCounts[i] < minCurrentCounts) minCurrentCounts = shiftCounts[i];
                    }

                    while (!validPick && safetyCount < 50) {
                        safetyCount++;
                        if (availableWorkers.length === 0) {
                            validPick = false;
                            break;
                        }
                        let randIdx = Math.floor(Math.random() * availableWorkers.length);
                        let candidate = availableWorkers[randIdx];
                        validPick = true;

                        if (shiftName === "白班" && lastShift[candidate] === "小夜") validPick = false;
                        if (avoidRuleMap[candidate]?.has(shiftName)) validPick = false;
                        if (shiftCounts[candidate] >= (minCurrentCounts + 2) && safetyCount < 10) validPick = false;

                        if (validPick) {
                            daySchedule[candidate] = shiftName;
                            shiftCounts[candidate]++;
                            stats[candidate][shiftName]++; // 新增：記錄統計
                            availableWorkers.splice(randIdx, 1);
                        }
                    }
                    if (!validPick) { isSuccess = false; break; }
                }
                
                if (!isSuccess) break;

                while (availableWorkers.length > 0) {
                    let c = availableWorkers.shift();
                    daySchedule[c] = "休";
                    stats[c]["休"]++; // 新增：記錄統計
                }

                schedule.push(daySchedule);
                for (let i = 0; i < doctorCount; i++) { lastShift[i] = daySchedule[i]; }
            }

            if (isSuccess) {
                let max = Math.max(...shiftCounts);
                let min = Math.min(...shiftCounts);
                if ((max - min) <= 1) break;
            }
        }

        if (!isSuccess) {
            alert("本次無法產出符合條件的班表，請調整手動預假或避班規則後再試。");
            return;
        }

        // 儲存資料供匯出使用
        globalScheduleData = schedule;
        globalDocs = getDoctorList(doctorCount);

        // === 3. 輸出 HTML 表格 (新增週末判斷) ===
        // 假設今年
        const currentYear = new Date().getFullYear();
        
        // 修改：新增「星期」欄位
        let html = `<table><thead><tr><th>日期</th><th>星期</th>`;
        globalDocs.forEach(doc => { html += `<th>${doc}</th>`; });
        html += `</tr></thead><tbody>`;

        const weekDays = ["日", "一", "二", "三", "四", "五", "六"];

        for (let d = 0; d < schedule.length; d++) {
            // 新增：計算日期物件與星期
            let dateObj = new Date(currentYear, mNum - 1, d + 1);
            let dayOfWeek = dateObj.getDay(); // 0=週日, 6=週六
            let isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            let rowClass = isWeekend ? "weekend-row" : "";
            let weekStr = weekDays[dayOfWeek];

            html += `<tr class="${rowClass}"><td>${d + 1}</td><td>${weekStr}</td>`;
            
            for (let doc = 0; doc < doctorCount; doc++) {
                let val = schedule[d][doc];
                let cssClass = "";
                if (val === "大夜") cssClass = "shift-bn";
                else if (val === "小夜") cssClass = "shift-sn";
                else if (val === "白班") cssClass = "shift-day";
                else cssClass = "shift-off";
                
                html += `<td class="${cssClass}">${val}</td>`;
            }
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById("tableContainer").innerHTML = html;

        // === 4. 新增：輸出統計表 ===
        let statsHtml = `<table><thead><tr><th>醫師</th><th>白班</th><th>小夜</th><th>大夜</th><th>休假</th><th>總上班數</th></tr></thead><tbody>`;
        for(let i=0; i<doctorCount; i++) {
            let totalWork = stats[i]["白班"] + stats[i]["小夜"] + stats[i]["大夜"];
            statsHtml += `<tr>
                <td>${globalDocs[i]}</td>
                <td>${stats[i]["白班"]}</td>
                <td>${stats[i]["小夜"]}</td>
                <td>${stats[i]["大夜"]}</td>
                <td>${stats[i]["休"]}</td>
                <td><strong>${totalWork}</strong></td>
            </tr>`;
        }
        statsHtml += `</tbody></table>`;
        document.getElementById("statsTable").innerHTML = statsHtml;
        document.getElementById("statsContainer").style.display = "block";

        let msg = `排班完成！\n標題：${globalTitle}\n天數：${daysInMonth} 天`;
        if (avoidRules.length) msg += `\n避班規則：${formatAvoidRulesSummary(avoidRules).replace("目前共 ", "")}`;
        // alert(msg); 
    }

    // === 新增：匯出 Excel (CSV) 功能 ===
    function exportToCSV() {
        if (globalScheduleData.length === 0) {
            alert("請先產生班表！");
            return;
        }

        // BOM for Excel to read UTF-8 correctly
        let csvContent = "\uFEFF";
        
        // 標題列
        csvContent += "日期,";
        globalDocs.forEach(doc => { csvContent += doc + ","; });
        csvContent += "\n";

        // 資料列
        globalScheduleData.forEach((row, index) => {
            csvContent += `${index + 1},`; // 日期
            row.forEach(shift => { csvContent += shift + ","; });
            csvContent += "\n";
        });

        // 建立下載連結
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `${globalTitle}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
